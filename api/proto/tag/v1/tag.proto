syntax="proto3";
package tag.v1;
option go_package="tag/v1;tagV1";

service TagService {
  // 创建标签（全局标签池）
  rpc CreateTag(CreateTagRequest) returns (CreateTagResponse);
  // 覆盖式地为资源设置标签
  rpc AttachTags(AttachTagsRequest) returns (AttachTagsResponse);
  // 获取所有标签（全局标签池，用于标签选择器）
  rpc GetTags(GetTagsRequest) returns (GetTagsResponse);
  // 获取单个标签详情（用于话题详情页）
  rpc GetTagById(GetTagByIdRequest) returns (GetTagByIdResponse);
  // 获取资源的标签
  rpc GetBizTags(GetBizTagsRequest) returns (GetBizTagsResponse);
  // 按标签获取文章ID列表（支持排序）
  rpc GetBizIdsByTag(GetBizIdsByTagRequest) returns (GetBizIdsByTagResponse);
  // 统计标签下的文章数量
  rpc CountBizByTag(CountBizByTagRequest) returns (CountBizByTagResponse);
  // 关注标签
  rpc FollowTag(FollowTagRequest) returns (FollowTagResponse);
  // 取消关注标签
  rpc UnfollowTag(UnfollowTagRequest) returns (UnfollowTagResponse);
  // 检查用户是否关注了标签
  rpc CheckTagFollow(CheckTagFollowRequest) returns (CheckTagFollowResponse);
  // 获取用户关注的标签列表
  rpc GetUserFollowedTags(GetUserFollowedTagsRequest) returns (GetUserFollowedTagsResponse);
  // 批量获取资源的标签
  rpc BatchGetBizTags(BatchGetBizTagsRequest) returns (BatchGetBizTagsResponse);
}

message CreateTagRequest {
  string name = 1;
  string description = 2;
}

message CreateTagResponse {
  Tag tag = 1;
}

message AttachTagsRequest {
  repeated int64 tids = 1;
  string biz = 2;
  int64 biz_id = 3;
}

message AttachTagsResponse {}

message GetTagsRequest {}

message GetTagsResponse {
  repeated Tag tags = 1;
}

message GetTagByIdRequest {
  int64 id = 1;
}

message GetTagByIdResponse {
  Tag tag = 1;
}

message GetBizTagsRequest {
  string biz = 1;
  int64 biz_id = 2;
}

message GetBizTagsResponse {
  repeated Tag tags = 1;
}

message GetBizIdsByTagRequest {
  string biz = 1;
  int64 tag_id = 2;
  int32 offset = 3;
  int32 limit = 4;
  // 排序方式: newest(默认按时间倒序), hottest(按热度), featured(精选)
  string sort_by = 5;
}

message GetBizIdsByTagResponse {
  repeated int64 biz_ids = 1;
}

message CountBizByTagRequest {
  string biz = 1;
  int64 tag_id = 2;
}

message CountBizByTagResponse {
  int64 count = 1;
}

message Tag {
  int64 id = 1;
  string name = 2;
  string description = 3;
  int64 follower_count = 4;
}

message FollowTagRequest {
  int64 uid = 1;
  int64 tag_id = 2;
}
message FollowTagResponse {}

message UnfollowTagRequest {
  int64 uid = 1;
  int64 tag_id = 2;
}
message UnfollowTagResponse {}

message CheckTagFollowRequest {
  int64 uid = 1;
  int64 tag_id = 2;
}
message CheckTagFollowResponse {
  bool followed = 1;
}

message GetUserFollowedTagsRequest {
  int64 uid = 1;
  int32 offset = 2;
  int32 limit = 3;
}
message GetUserFollowedTagsResponse {
  repeated Tag tags = 1;
}

message BatchGetBizTagsRequest {
  string biz = 1;
  repeated int64 biz_ids = 2;
}
message BizTagList {
  repeated Tag tags = 1;
}
message BatchGetBizTagsResponse {
  map<int64, BizTagList> biz_tags = 1;
}
