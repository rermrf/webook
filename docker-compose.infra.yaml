version: '3.8'

# ============================================================
# WeBook - 仅基础设施（开发环境）
# ============================================================
# 启动命令: docker-compose -f docker-compose.infra.yaml up -d
# ============================================================

networks:
  webook-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  etcd-data:
  mongo-data:
  kafka-data:
  es-data:

services:
  mysql:
    image: mysql:8.4.2
    container_name: webook-mysql
    restart: always
    command:
      - --binlog-format=ROW
      - --server-id=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/:/docker-entrypoint-initdb.d/
    ports:
      - "13306:3306"
    networks:
      - webook-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.0-alpine
    container_name: webook-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - webook-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/bitnami/etcd:3.5
    container_name: webook-etcd
    restart: always
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    volumes:
      - etcd-data:/bitnami/etcd
    ports:
      - "12379:2379"
    networks:
      - webook-net

  mongo:
    image: mongo:7.0
    container_name: webook-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - webook-net

  kafka:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/bitnami/kafka:3.6
    container_name: webook-kafka
    restart: always
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka-data:/bitnami/kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    networks:
      - webook-net

  elasticsearch:
    image: elasticsearch:8.15.5
    container_name: webook-es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - webook-net

  # 可选监控服务
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: webook-prometheus
    restart: always
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    command:
      - "--web.enable-remote-write-receiver"
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9091:9090"
    networks:
      - webook-net
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.0
    container_name: webook-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    networks:
      - webook-net
    profiles:
      - monitoring

  zipkin:
    image: openzipkin/zipkin-slim:3.4
    container_name: webook-zipkin
    restart: always
    ports:
      - "9411:9411"
    networks:
      - webook-net
    profiles:
      - monitoring

  # RustFS 对象存储（S3 兼容，后续可切换为阿里云/腾讯云 OSS）
  rustfs:
    image: rustfs/rustfs:latest
    container_name: webook-rustfs
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ROOT_USER: admin
      RUSTFS_ROOT_PASSWORD: admin123456
    volumes:
      - ./data/rustfs:/data
    command: server /data --console-address ":9001"
    networks:
      - webook-net
