        condition: service_healthy
      etcd:
        condition: service_healthy

  # 定时任务服务
  cronjob:
    build:
      context: .
      dockerfile: deploy/Dockerfile.service
      args:
        SERVICE_NAME: cronjob
    container_name: webook-cronjob
    restart: always
    networks:
      - webook-net
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_healthy
