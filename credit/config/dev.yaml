db:
  mysql:
    dsn: "root:root@tcp(localhost:13306)/webook_credit?charset=utf8mb4&parseTime=True&loc=Local"

redis:
  addr: "localhost:6379"

etcd:
  addr: "localhost:12379"

kafka:
  addrs:
    - "localhost:9094"

grpc:
  server:
    port: 8101
    etcdAddrs:
      - "localhost:12379"
  client:
    payment:
      target: "etcd:///service/payment"
      secure: false
    openapi:
      target: "etcd:///service/openapi"
      secure: false

# 开放API HTTP服务配置
http:
  server:
    port: ":8102"
